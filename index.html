<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>venus music</title>
  <meta name="theme-color" content="#07080d">
  <style>
    :root {
      color-scheme: dark;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --bg: #07080d;
      --ink: #f7f3ea;
      --muted: rgba(247, 243, 234, .62);
      --line: rgba(255, 255, 255, .14);
      --glass: rgba(16, 18, 27, .52);
      --glass-strong: rgba(18, 20, 31, .72);
      --hot: #ff4f7b;
      --aqua: #5ee7df;
      --gold: #ffd166;
      --violet: #9b7bff;
      --green: #80ff72;
      --accent: var(--aqua);
      --accent-2: var(--hot);
      --theme-gradient: linear-gradient(90deg, var(--accent), var(--accent-2));
      --shadow: 0 24px 90px rgba(0, 0, 0, .55), 0 2px 16px rgba(255, 255, 255, .08) inset;
      --spring: cubic-bezier(.16, 1, .3, 1);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body[data-theme="sky"] {
      --bg: #061018;
      --ink: #effcff;
      --muted: rgba(239, 252, 255, .64);
      --glass: rgba(7, 24, 36, .58);
      --glass-strong: rgba(8, 29, 45, .78);
      --accent: #76e7ff;
      --accent-2: #dffcff;
      --hot: #76e7ff;
      --aqua: #9bf1ff;
      --gold: #ffffff;
      --violet: #bcecff;
    }

    body[data-theme="white"] {
      --bg: #f4f6f8;
      --ink: #111318;
      --muted: rgba(17, 19, 24, .62);
      --line: rgba(0, 0, 0, .12);
      --glass: rgba(255, 255, 255, .62);
      --glass-strong: rgba(255, 255, 255, .82);
      --accent: #16191f;
      --accent-2: #b6c4d2;
      --hot: #111318;
      --aqua: #90a4b8;
      --gold: #ffffff;
      --violet: #cfd8e3;
    }

    body[data-theme="mono"] {
      --bg: #050505;
      --ink: #f8f8f8;
      --muted: rgba(248, 248, 248, .58);
      --line: rgba(255, 255, 255, .12);
      --glass: rgba(12, 12, 12, .64);
      --glass-strong: rgba(18, 18, 18, .84);
      --accent: #ffffff;
      --accent-2: #777777;
      --hot: #ffffff;
      --aqua: #bdbdbd;
      --gold: #efefef;
      --violet: #8d8d8d;
    }

    body[data-theme="red"] {
      --bg: #100306;
      --ink: #fff4f4;
      --muted: rgba(255, 244, 244, .62);
      --glass: rgba(35, 4, 10, .62);
      --glass-strong: rgba(43, 6, 13, .82);
      --accent: #ff335f;
      --accent-2: #ffd6dd;
      --hot: #ff335f;
      --aqua: #ffd6dd;
      --gold: #ff9dae;
      --violet: #ff6d88;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 16%, color-mix(in srgb, var(--accent) 28%, transparent), transparent 30rem),
        radial-gradient(circle at 86% 22%, color-mix(in srgb, var(--accent-2) 20%, transparent), transparent 26rem),
        radial-gradient(circle at 50% 100%, color-mix(in srgb, var(--gold) 13%, transparent), transparent 34rem),
        linear-gradient(135deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 78%, var(--accent) 22%) 48%, var(--bg) 100%);
      color: var(--ink);
    }

    body {
      min-height: 100svh;
      isolation: isolate;
      transition: background .65s var(--spring), color .65s var(--spring);
      overscroll-behavior-y: none;
      background-size: 180% 180%;
      animation: backgroundFlow 18s ease-in-out infinite alternate;
    }

    body.is-locked .shell {
      pointer-events: none;
      filter: blur(10px) saturate(.8);
      transform: scale(1.02);
      transition: filter .8s var(--spring), transform .8s var(--spring);
    }

    body.is-locked .admin-fab {
      display: none;
    }

    button,
    input {
      font: inherit;
      touch-action: manipulation;
    }

    button {
      color: inherit;
    }

    .noise,
    .aurora,
    .headlights,
    .ambient-dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .aurora {
      background:
        conic-gradient(from 210deg at 50% 50%, rgba(255, 79, 123, .16), rgba(94, 231, 223, .18), rgba(255, 209, 102, .12), rgba(155, 123, 255, .18), rgba(255, 79, 123, .16));
      filter: blur(72px) saturate(125%);
      opacity: .52;
      transform: scale(1.14);
      animation: breathe 11s var(--spring) infinite alternate;
      will-change: transform, opacity;
    }

    .noise {
      opacity: .13;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='180' height='180' filter='url(%23n)' opacity='.65'/%3E%3C/svg%3E");
    }

    .headlights {
      z-index: 1;
      opacity: .68;
      overflow: hidden;
      mix-blend-mode: screen;
    }

    .headlights span {
      position: absolute;
      left: -38vw;
      top: -12vh;
      width: 34vw;
      height: 124vh;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 24%, transparent), transparent);
      filter: blur(28px);
      transform: skewX(-17deg);
      animation: headlightSweep 8.5s var(--spring) infinite;
      will-change: transform, opacity;
    }

    .headlights span:nth-child(2) {
      width: 23vw;
      opacity: .55;
      animation-delay: -4s;
    }

    .ambient-dots {
      display: none;
      overflow: hidden;
      z-index: 0;
    }

    .ambient-dots span {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .9);
      box-shadow: 0 0 18px rgba(255, 255, 255, .55), 0 0 34px color-mix(in srgb, var(--accent) 46%, transparent), 0 0 58px color-mix(in srgb, var(--accent-2) 18%, transparent);
      opacity: .54;
      animation: floatDot linear infinite;
      will-change: transform, opacity;
    }

    .ambient-dots span:nth-child(1) { left: 6%; top: 12%; width: 5px; height: 5px; --from-x: -24vw; --from-y: -10vh; --mid-x: 16vw; --mid-y: 8vh; --to-x: 34vw; --to-y: 18vh; animation-duration: 7s; animation-delay: -1s; }
    .ambient-dots span:nth-child(2) { left: 12%; top: 76%; width: 8px; height: 8px; --from-x: -22vw; --from-y: 16vh; --mid-x: 18vw; --mid-y: -6vh; --to-x: 42vw; --to-y: -18vh; animation-duration: 9s; animation-delay: -5s; }
    .ambient-dots span:nth-child(3) { left: 18%; top: 28%; width: 4px; height: 4px; --from-x: -20vw; --from-y: -12vh; --mid-x: 22vw; --mid-y: 6vh; --to-x: 46vw; --to-y: 16vh; animation-duration: 8s; animation-delay: -3s; }
    .ambient-dots span:nth-child(4) { left: 26%; top: 90%; width: 7px; height: 7px; --from-x: -10vw; --from-y: 18vh; --mid-x: 10vw; --mid-y: -12vh; --to-x: 22vw; --to-y: -26vh; animation-duration: 10s; animation-delay: -7s; }
    .ambient-dots span:nth-child(5) { left: 34%; top: 8%; width: 6px; height: 6px; --from-x: 0vw; --from-y: -18vh; --mid-x: 8vw; --mid-y: 10vh; --to-x: 18vw; --to-y: 24vh; animation-duration: 7.5s; animation-delay: -4s; }
    .ambient-dots span:nth-child(6) { left: 44%; top: 82%; width: 9px; height: 9px; --from-x: -4vw; --from-y: 16vh; --mid-x: 6vw; --mid-y: -8vh; --to-x: 16vw; --to-y: -24vh; animation-duration: 11s; animation-delay: -8s; }
    .ambient-dots span:nth-child(7) { left: 52%; top: 10%; width: 5px; height: 5px; --from-x: 2vw; --from-y: -16vh; --mid-x: -10vw; --mid-y: 8vh; --to-x: -18vw; --to-y: 22vh; animation-duration: 8.5s; animation-delay: -2s; }
    .ambient-dots span:nth-child(8) { left: 60%; top: 88%; width: 6px; height: 6px; --from-x: 4vw; --from-y: 18vh; --mid-x: -8vw; --mid-y: -8vh; --to-x: -18vw; --to-y: -24vh; animation-duration: 9.5s; animation-delay: -6s; }
    .ambient-dots span:nth-child(9) { left: 68%; top: 18%; width: 4px; height: 4px; --from-x: 18vw; --from-y: -12vh; --mid-x: -12vw; --mid-y: 6vh; --to-x: -28vw; --to-y: 18vh; animation-duration: 7.8s; animation-delay: -1.5s; }
    .ambient-dots span:nth-child(10) { left: 78%; top: 72%; width: 8px; height: 8px; --from-x: 22vw; --from-y: 12vh; --mid-x: -14vw; --mid-y: -6vh; --to-x: -32vw; --to-y: -18vh; animation-duration: 10.5s; animation-delay: -7.5s; }
    .ambient-dots span:nth-child(11) { left: 86%; top: 14%; width: 5px; height: 5px; --from-x: 24vw; --from-y: -14vh; --mid-x: -10vw; --mid-y: 8vh; --to-x: -30vw; --to-y: 20vh; animation-duration: 8.2s; animation-delay: -2.5s; }
    .ambient-dots span:nth-child(12) { left: 92%; top: 52%; width: 7px; height: 7px; --from-x: 20vw; --from-y: 0vh; --mid-x: -10vw; --mid-y: -4vh; --to-x: -26vw; --to-y: -10vh; animation-duration: 9.8s; animation-delay: -6.5s; }
    .ambient-dots span:nth-child(13) { left: 8%; top: 44%; width: 3px; height: 3px; --from-x: -20vw; --from-y: 0vh; --mid-x: 18vw; --mid-y: -2vh; --to-x: 34vw; --to-y: -6vh; animation-duration: 6.8s; animation-delay: -4.5s; }
    .ambient-dots span:nth-child(14) { left: 38%; top: 94%; width: 4px; height: 4px; --from-x: 0vw; --from-y: 16vh; --mid-x: 6vw; --mid-y: -10vh; --to-x: 14vw; --to-y: -26vh; animation-duration: 11.2s; animation-delay: -8.5s; }
    .ambient-dots span:nth-child(15) { left: 72%; top: 96%; width: 3px; height: 3px; --from-x: 0vw; --from-y: 18vh; --mid-x: -8vw; --mid-y: -12vh; --to-x: -18vw; --to-y: -28vh; animation-duration: 7.2s; animation-delay: -5.2s; }
    .ambient-dots span:nth-child(16) { left: 94%; top: 36%; width: 4px; height: 4px; --from-x: 18vw; --from-y: 0vh; --mid-x: -14vw; --mid-y: 6vh; --to-x: -34vw; --to-y: 14vh; animation-duration: 8.8s; animation-delay: -3.8s; }

    .shell {
      display: grid;
      min-height: 100svh;
      grid-template-rows: auto 1fr;
      padding: clamp(18px, 3vw, 42px);
      gap: clamp(18px, 3vw, 36px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      opacity: 0;
      transform: translateY(-12px);
      animation: enter .9s var(--spring) .12s forwards;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(247, 243, 234, .82);
      font-size: 12px;
      font-weight: 760;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 35%, #fff7, transparent 18%),
        conic-gradient(from 180deg, var(--hot), var(--gold), var(--aqua), var(--violet), var(--hot));
      box-shadow: 0 0 28px rgba(94, 231, 223, .28);
      flex: 0 0 auto;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .06);
      backdrop-filter: blur(18px);
      color: rgba(247, 243, 234, .78);
      box-shadow: 0 10px 40px rgba(0, 0, 0, .2);
      white-space: nowrap;
      font-size: 12px;
      text-transform: lowercase;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 18px var(--green);
      transform: scale(.8);
      transition: transform .55s var(--spring), background .55s var(--spring);
    }

    body:not(.is-playing) .status-dot {
      background: var(--hot);
      box-shadow: 0 0 18px rgba(255, 79, 123, .8);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, .88fr) minmax(360px, 1.12fr);
      align-items: center;
      gap: clamp(24px, 5vw, 82px);
      width: min(1440px, 100%);
      margin: 0 auto;
    }

    .copy {
      display: grid;
      align-content: center;
      gap: 24px;
      min-width: 0;
      opacity: 0;
      transform: translateY(20px);
      animation: enter 1s var(--spring) .24s forwards;
    }

    .eyebrow {
      width: fit-content;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 999px;
      background: rgba(255, 255, 255, .06);
      color: rgba(247, 243, 234, .72);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: .08em;
      text-transform: uppercase;
      backdrop-filter: blur(20px);
    }

    h1 {
      max-width: 10ch;
      margin: 0;
      font-size: clamp(54px, 10vw, 150px);
      line-height: .84;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 28px 80px rgba(0, 0, 0, .46);
    }

    h1 span {
      display: block;
      background: linear-gradient(95deg, #fff 0%, #ffdbe4 34%, #bafcf8 68%, #fff1bd 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 34px rgba(255, 79, 123, .14));
    }

    .player-panel {
      display: grid;
      gap: 18px;
      width: min(560px, 100%);
      padding: clamp(18px, 2.2vw, 24px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255, 255, 255, .14), rgba(255, 255, 255, .045));
      box-shadow: var(--shadow);
      backdrop-filter: blur(26px) saturate(140%);
      container-type: inline-size;
    }

    .track-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
    }

    .track-title {
      min-width: 0;
      margin: 0;
      font-size: clamp(20px, 5cqw, 28px);
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .track-meta {
      margin: 7px 0 0;
      color: rgba(247, 243, 234, .52);
      font-size: 13px;
    }

    .bass-meter {
      display: grid;
      place-items: end center;
      width: 68px;
      height: 68px;
      border: 1px solid rgba(255, 255, 255, .13);
      border-radius: 22px;
      background: rgba(0, 0, 0, .22);
      box-shadow: 0 12px 28px rgba(0, 0, 0, .2), 0 0 calc(var(--bass, 0) * 34px) rgba(94, 231, 223, .35);
      overflow: hidden;
    }

    .bass-fill {
      width: 100%;
      height: calc(18% + var(--bass, 0) * 82%);
      background: linear-gradient(0deg, var(--aqua), var(--hot));
      border-radius: 18px 18px 0 0;
      transition: height .16s var(--spring);
      will-change: height;
    }

    .controls {
      display: grid;
      grid-template-columns: auto auto auto minmax(110px, 1fr);
      gap: 12px;
      align-items: center;
    }

    .icon-btn,
    .play-btn {
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, .16);
      cursor: pointer;
      transition: transform .42s var(--spring), border-color .42s var(--spring), background .42s var(--spring), box-shadow .42s var(--spring);
      will-change: transform;
    }

    .icon-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 24%, rgba(255, 255, 255, .26), transparent 35%),
        rgba(255, 255, 255, .075);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .28),
        inset 0 -10px 18px rgba(255, 255, 255, .04),
        0 12px 30px rgba(0, 0, 0, .22);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
    }

    .play-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 24%, rgba(255, 255, 255, .82), transparent 22%),
        radial-gradient(circle at 72% 86%, color-mix(in srgb, var(--accent-2) 72%, transparent), transparent 38%),
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 82%, white 12%), color-mix(in srgb, var(--accent-2) 76%, white 18%));
      color: #080910;
      box-shadow:
        0 18px 46px color-mix(in srgb, var(--accent) 28%, transparent),
        0 0 62px color-mix(in srgb, var(--accent-2) 18%, transparent),
        inset 0 1px 0 rgba(255, 255, 255, .72),
        inset 0 -12px 24px rgba(0, 0, 0, .12);
    }

    .icon-btn:hover,
    .play-btn:hover {
      transform: translateY(-3px) scale(1.04);
      border-color: rgba(255, 255, 255, .34);
    }

    .icon-btn:active,
    .play-btn:active {
      transform: translateY(1px) scale(.97);
    }

    .icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .progress-wrap {
      display: grid;
      gap: 12px;
      padding-top: 20px;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      color: rgba(247, 243, 234, .52);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      padding-inline: 2px;
    }

    .progress {
      position: relative;
      height: 16px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .24), rgba(255, 255, 255, .055)),
        rgba(255, 255, 255, .08);
      overflow: hidden;
      cursor: pointer;
      box-shadow: inset 0 1px 4px rgba(0, 0, 0, .46), 0 16px 42px rgba(0, 0, 0, .14), inset 0 1px 0 rgba(255, 255, 255, .16);
      touch-action: none;
    }

    .progress-bar {
      width: calc(var(--display-progress, 0) * 100%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 88%, white), color-mix(in srgb, var(--accent-2) 82%, white));
      box-shadow: 0 0 30px color-mix(in srgb, var(--accent) 34%, transparent);
      will-change: width;
    }

    .progress-thumb {
      position: absolute;
      left: calc(var(--display-progress, 0) * 100%);
      top: 50%;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, .94);
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 30%, #ffffff, color-mix(in srgb, var(--accent) 78%, white) 74%);
      box-shadow: 0 9px 20px color-mix(in srgb, var(--accent) 32%, transparent);
      transform: translate(-50%, -50%) scale(calc(.9 + var(--bass, 0) * .18));
      pointer-events: none;
      will-change: left, transform;
    }

    .progress-bubble {
      position: absolute;
      left: calc(var(--display-progress, 0) * 100%);
      bottom: calc(100% + 10px);
      min-width: 48px;
      padding: 6px 9px;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 10%, rgba(255, 255, 255, .24), transparent 34%),
        rgba(10, 12, 18, .62);
      color: rgba(247, 243, 234, .92);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      text-align: center;
      box-shadow: 0 12px 28px rgba(0, 0, 0, .28);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      transform: translateX(-50%);
      pointer-events: none;
      will-change: left;
    }

    .visual-stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: min(68svh, 740px);
      opacity: 0;
      transform: translateY(22px) scale(.985);
      animation: enter 1.08s var(--spring) .34s forwards;
    }

    #stage {
      width: min(720px, 100%);
      aspect-ratio: 1;
      display: block;
      filter: drop-shadow(0 44px 92px rgba(0, 0, 0, .55));
      touch-action: none;
    }

    .halo {
      display: none;
    }

    .track-list {
      display: grid;
      gap: 10px;
      max-height: 174px;
      overflow: auto;
      padding-right: 2px;
    }

    .track-button {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 54px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, .11);
      border-radius: 18px;
      background: rgba(255, 255, 255, .055);
      cursor: pointer;
      text-align: left;
      transition: transform .38s var(--spring), background .38s var(--spring), border-color .38s var(--spring);
    }

    .track-button:hover,
    .track-button.is-active {

    let adminUnlocked = storageGet(ADMIN_UNLOCK_STORAGE_KEY) === "1";
    let sessionId = storageGet(SESSION_STORAGE_KEY) || `sess-${Math.random().toString(36).slice(2, 10)}`;
    storageSet(SESSION_STORAGE_KEY, sessionId);

    audio.volume = BASE_VOLUME;
    discoverTracks();
    updateModeButton();
    restoreUnlockState();
    startUiLoop();
    hydrateAdminState();
    initBackend();
    collectMetrics();
    logEvent("site_enter", { loadHintMs: Math.round(performance.now()) });

    function setupAudioGraph() {
      if (!ENABLE_VISUALIZER) return;
      if (audioContext) return;

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = useLiteVisualizer ? 256 : 1024;
      analyser.smoothingTimeConstant = useLiteVisualizer ? 0.76 : 0.82;
      frequencyData = new Uint8Array(analyser.frequencyBinCount);
      source = audioContext.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioContext.destination);
      audioGraphEnabled = true;
    }

    function storageGet(key) {
      try {
        return window.localStorage.getItem(key);
      } catch (error) {
        return null;
      }
    }

    function storageSet(key, value) {
      try {
        window.localStorage.setItem(key, value);
      } catch (error) {
        // Private mode can block storage; the player still unlocks for this session.
      }
    }

    function generateId(prefix = "id") {
      return `${prefix}-${Math.random().toString(36).slice(2, 10)}`;
    }

    async function measureSitePing() {
      if (!window.fetch || !window.AbortController) return 0;
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), 5000);
      const pingUrl = window.location.protocol.startsWith("http")
        ? new URL(window.location.pathname || "/", window.location.origin)
        : new URL("index.html", window.location.href);
      pingUrl.searchParams.set("ping", `${Date.now()}-${Math.random().toString(36).slice(2)}`);

      try {
        const startedAt = performance.now();
        await fetch(pingUrl.href, {
          method: "HEAD",
          cache: "no-store",
          credentials: "same-origin",
          signal: controller.signal
        });
        return Math.max(1, Math.round(performance.now() - startedAt));
      } catch (error) {
        return 0;
      } finally {
        window.clearTimeout(timeoutId);
      }
    }

    async function collectMetrics() {
      const navigationEntry = performance.getEntriesByType("navigation")[0];
      const pingMs = await measureSitePing();
      metricsSnapshot = {
        loadMs: Math.round(navigationEntry?.domComplete || performance.now()),
        pingMs,
        pageKb: Math.round((navigationEntry?.transferSize || 0) / 1024),
        domNodes: document.querySelectorAll("*").length,
        viewport: `${window.innerWidth}x${window.innerHeight}`
      };
      renderMetrics();
      return metricsSnapshot;
    }

    function renderMetrics() {
      if (!metricsGrid) return;
      const items = [
        ["Load", metricsSnapshot.loadMs ? `${metricsSnapshot.loadMs} ms` : "n/a"],
        ["Ping", metricsSnapshot.pingMs ? `${metricsSnapshot.pingMs} ms` : "n/a"],
        ["Page", metricsSnapshot.pageKb ? `${metricsSnapshot.pageKb} KB` : "cache"],
        ["DOM", metricsSnapshot.domNodes ? `${metricsSnapshot.domNodes}` : "n/a"],
        ["Viewport", metricsSnapshot.viewport || "n/a"]
      ];
      metricsGrid.innerHTML = items.map(([label, value]) => `
        <article class="metric-pill">
          <p class="metric-label">${label}</p>
          <p class="metric-value">${value}</p>
        </article>
      `).join("");
    }

    function getVisibleTrackIndexes() {
      if (activePlaylistId === "all") return tracks.map((_, index) => index);
      const playlist = playlists.find((item) => item.id === activePlaylistId);
      if (!playlist) return tracks.map((_, index) => index);
      const allowed = new Set(playlist.tracks || []);
      return tracks
        .map((track, index) => allowed.has(track.file) ? index : -1)
        .filter((index) => index >= 0);
    }

    function getVisibleTracks() {
      return getVisibleTrackIndexes().map((index) => ({ track: tracks[index], index }));
    }

    function renderPlaylistStrip() {
      if (!playlistStrip) return;
      const chips = [{ id: "all", name: "all tracks" }, ...playlists];
      playlistStrip.innerHTML = chips.map((playlist) => `
        <button class="playlist-chip${playlist.id === activePlaylistId ? " is-active" : ""}" type="button" data-playlist-id="${playlist.id}">
          ${playlist.name}
        </button>
      `).join("");

      playlistStrip.querySelectorAll("[data-playlist-id]").forEach((button) => {
        button.addEventListener("click", () => {
          activePlaylistId = button.dataset.playlistId || "all";
          renderPlaylistStrip();
          renderPlaylist();
          logEvent("playlist_filter", { playlistId: activePlaylistId });
        });
      });
    }

    function persistPlaylistsLocal() {
      storageSet(PLAYLIST_STORAGE_KEY, JSON.stringify(playlists));
    }

    async function persistPlaylistsRemote() {
      if (!firebaseReady || !firebaseDb || !firebaseApi) return;
      try {
        await firebaseApi.set(firebaseApi.ref(firebaseDb, "venus_music/playlists"), playlists);
      } catch (error) {
        console.warn("Playlist sync failed.", error);
      }
    }

    async function savePlaylists() {
      persistPlaylistsLocal();
      renderPlaylistStrip();
      renderAdminPlaylists();
      renderPlaylist();
      await persistPlaylistsRemote();
    }

    function renderTrackPicker() {
      if (!adminTrackPicker) return;
      adminTrackPicker.innerHTML = tracks.map((track) => {
        const selected = playlistDraft.has(track.file);
        return `
          <article class="picker-row${selected ? " is-selected" : ""}">
            <div>
              <strong>${track.title}</strong>
              <div class="picker-meta">${track.file}</div>
            </div>
            <button class="picker-toggle" type="button" data-track-file="${track.file}">
              ${selected ? "убрать" : "добавить"}
            </button>
          </article>
        `;
      }).join("");

      adminTrackPicker.querySelectorAll("[data-track-file]").forEach((button) => {
        button.addEventListener("click", () => {
          const file = button.dataset.trackFile || "";
          if (playlistDraft.has(file)) {
            playlistDraft.delete(file);
          } else {
            playlistDraft.add(file);
          }
          renderTrackPicker();
        });
      });
    }

    function renderAdminPlaylists() {
      if (!adminPlaylists) return;
      if (!playlists.length) {
        adminPlaylists.innerHTML = '<div class="admin-log-meta">Плейлистов пока нет.</div>';
        return;
      }

      adminPlaylists.innerHTML = playlists.map((playlist) => `
        <article class="admin-playlist-row">
          <div>
            <strong>${playlist.name}</strong>
            <div class="picker-meta">${playlist.tracks.length} треков</div>
          </div>
          <div class="admin-row-actions">
            <button class="admin-row-btn" type="button" data-playlist-open="${playlist.id}">open</button>
            <button class="admin-row-btn" type="button" data-playlist-delete="${playlist.id}">delete</button>
          </div>
        </article>
      `).join("");

      adminPlaylists.querySelectorAll("[data-playlist-open]").forEach((button) => {
        button.addEventListener("click", () => {
          activePlaylistId = button.dataset.playlistOpen || "all";
          renderPlaylistStrip();
          renderPlaylist();
          logEvent("playlist_open", { playlistId: activePlaylistId });
        });
      });

      adminPlaylists.querySelectorAll("[data-playlist-delete]").forEach((button) => {
        button.addEventListener("click", async () => {
          const playlistId = button.dataset.playlistDelete || "";
          playlists = playlists.filter((item) => item.id !== playlistId);
          if (activePlaylistId === playlistId) activePlaylistId = "all";
          await savePlaylists();
          logEvent("playlist_delete", { playlistId });
        });
      });
    }

    function renderLogs() {
      if (!adminLogList) return;
      const items = [...adminLogs].slice(-40).reverse();
      adminLogList.innerHTML = items.length
        ? items.map((entry) => `
            <article class="admin-log-row">
              <div>
                <strong>${entry.action}</strong>
                <div class="admin-log-meta">${entry.timeLabel} • ${entry.detailsText}</div>
              </div>
              <span class="admin-log-meta">${entry.sessionId}</span>
            </article>
          `).join("")
        : '<div class="admin-log-meta">Логи пока пустые.</div>';
    }

    async function syncLogsRemote(entry) {
      if (!firebaseReady || !firebaseDb || !firebaseApi) return;
      try {
        await firebaseApi.push(firebaseApi.ref(firebaseDb, "venus_music/logs"), entry);
      } catch (error) {
        console.warn("Log sync failed.", error);
      }
    }

    function logEvent(action, details = {}) {
      const entry = {
        id: generateId("log"),
        action,
        details,
        detailsText: Object.entries(details).map(([key, value]) => `${key}: ${value}`).join(" • ") || "no details",
        sessionId,
        timestamp: Date.now(),
        timeLabel: new Date().toLocaleString("ru-RU"),
        track: tracks[trackIndex]?.title || "",
        viewport: `${window.innerWidth}x${window.innerHeight}`
      };
      adminLogs = [...adminLogs, entry].slice(-160);
      storageSet(LOG_STORAGE_KEY, JSON.stringify(adminLogs));
      renderLogs();
      syncLogsRemote(entry);
    }

    async function initBackend() {
      if (firebaseInitStarted) return;
      firebaseInitStarted = true;
      try {
        const [{ initializeApp }, databaseModule] = await Promise.all([
          import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
          import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js")
        ]);
        const app = initializeApp(FIREBASE_CONFIG);
        firebaseDb = databaseModule.getDatabase(app);
        firebaseApi = databaseModule;
        firebaseReady = true;
        if (firebaseStatus) firebaseStatus.textContent = "Firebase: connected";

        databaseModule.onValue(databaseModule.ref(firebaseDb, "venus_music/playlists"), (snapshot) => {
          const value = snapshot.val();
          if (value) {
            playlists = Array.isArray(value) ? value : Object.values(value);
            persistPlaylistsLocal();
            renderPlaylistStrip();
            renderAdminPlaylists();
            renderTrackPicker();
            renderPlaylist();
          }
        });

        databaseModule.onValue(databaseModule.ref(firebaseDb, "venus_music/logs"), (snapshot) => {
          const value = snapshot.val();
          if (!value) return;
          adminLogs = Object.values(value).slice(-160).map((entry) => ({
            ...entry,
            detailsText: entry.detailsText || Object.entries(entry.details || {}).map(([key, val]) => `${key}: ${val}`).join(" • ")
          }));
          renderLogs();
        });

        await persistPlaylistsRemote();
      } catch (error) {
        console.warn("Firebase unavailable, using local admin storage.", error);
        firebaseReady = false;
        if (firebaseStatus) firebaseStatus.textContent = "Firebase: local mode";
      }
    }

    function hydrateAdminState() {
      playlists = JSON.parse(storageGet(PLAYLIST_STORAGE_KEY) || "[]");
      adminLogs = JSON.parse(storageGet(LOG_STORAGE_KEY) || "[]");
      if (!Array.isArray(playlists)) playlists = [];
      if (!Array.isArray(adminLogs)) adminLogs = [];
      if (sessionStatus) sessionStatus.textContent = `Session: ${sessionId}`;
      if (adminUnlocked) {
        adminGate.hidden = true;
        adminDashboard.hidden = false;
      }
      renderMetrics();
      renderTrackPicker();
      renderAdminPlaylists();
      renderPlaylistStrip();
      renderLogs();
    }

    function openAdmin() {
      adminOverlay.hidden = false;
      if (!adminUnlocked) {
        adminPassInput.focus();
      } else {
        void collectMetrics();
      }
      logEvent("admin_open");
    }

    function closeAdmin() {
      adminOverlay.hidden = true;
    }

    function unlockSite(remember = false) {
      if (remember) storageSet(AUTH_STORAGE_KEY, "1");
      lockError.classList.remove("is-visible");
      body.classList.remove("is-locked");
      lockScreen.classList.add("is-unlocked");
      resetIdleTimer();
      logEvent("site_unlock", { remembered: remember });
    }

    function restoreUnlockState() {
      if (storageGet(AUTH_STORAGE_KEY) === "1") {
        unlockSite();
        return;
      }

      passwordInput.focus();
    }

    lockForm.addEventListener("submit", (event) => {
      event.preventDefault();
      if (passwordInput.value.trim() === "771") {
        unlockSite(true);
        return;
      }

      lockError.classList.add("is-visible");
      lockCard.classList.remove("is-wrong");
      void lockCard.offsetWidth;
      lockCard.classList.add("is-wrong");
      passwordInput.select();
    });

    adminFab.addEventListener("click", openAdmin);
    adminClose.addEventListener("click", closeAdmin);
    adminBackdrop.addEventListener("click", closeAdmin);

    adminPassForm.addEventListener("submit", (event) => {
      event.preventDefault();
      if (adminPassInput.value.trim() === "771") {
        adminUnlocked = true;
        storageSet(ADMIN_UNLOCK_STORAGE_KEY, "1");
        adminError.classList.remove("is-visible");
        adminGate.hidden = true;
        adminDashboard.hidden = false;
        renderTrackPicker();
        renderAdminPlaylists();
        void collectMetrics();
        renderLogs();
        logEvent("admin_unlock");
        return;
      }
      adminError.classList.add("is-visible");
      adminPassInput.select();
    });

    refreshMetricsBtn.addEventListener("click", async () => {
      const snapshot = await collectMetrics();
      logEvent("metrics_refresh", snapshot);
    });

    clearPlaylistDraftBtn.addEventListener("click", () => {
      playlistDraft.clear();
      playlistNameInput.value = "";
      renderTrackPicker();
    });

    savePlaylistBtn.addEventListener("click", async () => {
      const name = playlistNameInput.value.trim();
      if (!name || !playlistDraft.size) return;
      const playlist = {
        id: generateId("playlist"),
        name,
        tracks: [...playlistDraft]
      };
      playlists = [...playlists, playlist];
      playlistDraft.clear();
      playlistNameInput.value = "";
      await savePlaylists();
      renderTrackPicker();
      activePlaylistId = playlist.id;
      renderPlaylistStrip();
      logEvent("playlist_create", { playlist: name, tracks: playlist.tracks.length });
    });

    async function togglePlayback() {
      if (audio.paused) {
        await playWithFade();
        logEvent("play");
      } else {
        await pauseWithFade();
        logEvent("pause");
      }
    }

    function loadTrack(index, autoplay = false) {
      if (!tracks.length) return;
      trackIndex = (index + tracks.length) % tracks.length;
      const track = tracks[trackIndex];
      audio.src = encodeURI(track.file);
      trackTitle.textContent = shortTitle(track.title);
      trackMeta.textContent = "venus music";
      statusText.textContent = "loaded";
      updateAlbumAvatar(track);
      updateMediaSession(track);
      targetProgress = 0;
      displayProgress = 0;
      root.style.setProperty("--progress", "0");
      root.style.setProperty("--display-progress", "0");
      renderProgressVisual(0);
      updatePlaylistState();

      if (autoplay) {
        playWithFade().catch(() => {
          statusText.textContent = "Нажми play для запуска";
        });
      }
    }

    async function discoverTracks() {
      try {
        const response = await fetch("music/tracks.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`Track list unavailable: ${response.status}`);

        const manifest = await response.json();
        const discovered = (Array.isArray(manifest) ? manifest : [])
          .map((entry) => typeof entry === "string" ? { file: entry } : entry)
          .map((entry) => {
            const fileName = typeof entry.file === "string" ? entry.file.trim() : "";
            return {
              title: typeof entry.title === "string" && entry.title.trim()
                ? entry.title.trim()
                : cleanTrackTitle(fileName),
              artist: typeof entry.artist === "string" && entry.artist.trim()
                ? entry.artist.trim()
                : "venus music",
              file: fileName
            };
          })
          .filter((track) => /^music\/.+\.(mp3|m4a)$/i.test(track.file))
          .sort((a, b) => a.file.localeCompare(b.file, "ru", { numeric: true, sensitivity: "base" }))
          .map((track) => ({
            ...track,
            title: track.title || cleanTrackTitle(track.file.split("/").pop() || "")
          }));

        if (discovered.length) {
          tracks = discovered;
          loadTrack(0, false);
          renderTrackPicker();
          renderPlaylistStrip();
        } else {
          trackTitle.textContent = "no music";
          trackMeta.textContent = "add mp3 or m4a";
        }
      } catch (error) {
        console.warn("Music folder scan unavailable.", error);
        trackTitle.textContent = "no music";
        trackMeta.textContent = "music folder unavailable";
      }

      renderPlaylist();
    }

    function cleanTrackTitle(fileName) {
      return fileName
        .replace(/\.[^.]+$/, "")
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function shortTitle(title) {
      return title
        .replace(/[()]/g, " ")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .join(" ");
    }

    function renderPlaylist() {
      trackList.innerHTML = "";
      const visibleTracks = getVisibleTracks();
      if (!visibleTracks.length) {
        trackList.innerHTML = '<div class="admin-log-meta">В этом плейлисте пока нет треков.</div>';
        updatePlaylistState();
        return;
      }

      visibleTracks.forEach(({ track, index }) => {
        const button = document.createElement("button");
        button.className = "track-button";
        button.type = "button";
        button.dataset.trackIndex = String(index);
        button.innerHTML = `
          <span class="track-index">${String(index + 1).padStart(2, "0")}</span>
          <span class="track-name">${shortTitle(track.title)}</span>
          <span class="track-badge">play</span>
        `;
        button.addEventListener("click", () => {
          switchTrackWithFade(index).catch(() => {
            statusText.textContent = "track switch error";
          });
        });
        trackList.append(button);
      });

      updatePlaylistState();
    }

    function updatePlaylistState() {
      [...trackList.children].forEach((button) => {
        button.classList.toggle("is-active", Number(button.dataset.trackIndex) === trackIndex);
      });
    }

    async function updateAlbumAvatar(track) {
      albumAvatar.classList.remove("has-cover");
      albumAvatar.style.removeProperty("--cover-image");
      const initials = track.title
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((word) => word[0])
        .join("")
        .replace(/[^a-zа-я0-9]/gi, "")
        .toLowerCase() || "vm";
      albumAvatar.querySelector("span").textContent = initials;

      try {
        const coverUrl = await readMp3Cover(track.file);
        if (coverUrl && audio.src.includes(encodeURI(track.file))) {
          albumAvatar.style.setProperty("--cover-image", `url("${coverUrl}")`);
          albumAvatar.classList.add("has-cover");
        }
      } catch (error) {
        console.warn("Cover art unavailable.", error);
      }
    }

    async function readMp3Cover(file) {
      const response = await fetch(encodeURI(file));
      const buffer = await response.arrayBuffer();
      const bytes = new Uint8Array(buffer);
      if (bytes[0] !== 0x49 || bytes[1] !== 0x44 || bytes[2] !== 0x33) return "";

      const tagSize = syncSafeToInt(bytes[6], bytes[7], bytes[8], bytes[9]);
      let offset = 10;
      const end = Math.min(bytes.length, 10 + tagSize);

      while (offset + 10 < end) {
        const frameId = String.fromCharCode(bytes[offset], bytes[offset + 1], bytes[offset + 2], bytes[offset + 3]);
        const frameSize = bytes[3] === 4
          ? syncSafeToInt(bytes[offset + 4], bytes[offset + 5], bytes[offset + 6], bytes[offset + 7])
          : byteSizeToInt(bytes[offset + 4], bytes[offset + 5], bytes[offset + 6], bytes[offset + 7]);
        if (!frameId.trim() || frameSize <= 0) break;

        if (frameId === "APIC") {
          const frame = bytes.slice(offset + 10, offset + 10 + frameSize);
          let cursor = 1;
          const mimeEnd = frame.indexOf(0, cursor);
          const mime = new TextDecoder("latin1").decode(frame.slice(cursor, mimeEnd));
          cursor = mimeEnd + 2;
          while (cursor < frame.length && frame[cursor] !== 0) cursor += 1;
          cursor += 1;
          const imageBytes = frame.slice(cursor);
          return URL.createObjectURL(new Blob([imageBytes], { type: mime || "image/jpeg" }));
        }

        offset += 10 + frameSize;
      }

      return "";
    }

    function syncSafeToInt(a, b, c, d) {
      return (a << 21) | (b << 14) | (c << 7) | d;
    }

    function byteSizeToInt(a, b, c, d) {
      return (a << 24) | (b << 16) | (c << 8) | d;
    }

    function updatePlayState() {
      const isPlaying = !audio.paused;
      body.classList.toggle("is-playing", isPlaying);
      if (!isPlaying) {
        smoothBass = 0;
        root.style.setProperty("--bass", "0");
      }
      playBtn.setAttribute("aria-label", isPlaying ? "Пауза" : "Воспроизвести");
      playIcon.innerHTML = isPlaying
        ? '<path d="M7 5h4v14H7V5Zm6 0h4v14h-4V5Z"/>'
        : '<path d="M8 5v14l11-7L8 5Z"/>';
      statusText.textContent = isPlaying ? "playing" : "pause";
      if ("mediaSession" in navigator) {
        navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";
      }
    }

    function updateMediaSession(track) {
      if (!("mediaSession" in navigator) || typeof MediaMetadata === "undefined") return;

      navigator.mediaSession.metadata = new MediaMetadata({
        title: track.title,
        artist: "venus music",
        album: "venus music"
      });
    }

    function updateMediaPosition() {
      if (!("mediaSession" in navigator) || typeof navigator.mediaSession.setPositionState !== "function") return;
      if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;

      try {
        navigator.mediaSession.setPositionState({
          duration: audio.duration,
          playbackRate: audio.playbackRate,
          position: Math.min(audio.duration, Math.max(0, audio.currentTime))
        });
      } catch (error) {
        // Some mobile browsers expose Media Session only partially.
      }
    }

    function setMediaAction(action, handler) {
      if (!("mediaSession" in navigator) || typeof navigator.mediaSession.setActionHandler !== "function") return;

      try {
        navigator.mediaSession.setActionHandler(action, handler);
      } catch (error) {
        // Unsupported actions are ignored without breaking playback.
      }
    }

    if ("mediaSession" in navigator) {
      setMediaAction("play", () => {
        if (audio.paused) {
          playWithFade().catch(() => {});
        }
      });
      setMediaAction("pause", () => {
        if (!audio.paused) pauseWithFade().catch(() => {});
      });
      setMediaAction("previoustrack", () => switchTrackWithFade(nextTrackIndex(-1)).catch(() => {}));
      setMediaAction("nexttrack", () => switchTrackWithFade(nextTrackIndex(1)).catch(() => {}));
      setMediaAction("seekbackward", () => {
        if (Number.isFinite(audio.duration)) audio.currentTime = Math.max(0, audio.currentTime - 10);
      });
      setMediaAction("seekforward", () => {
        if (Number.isFinite(audio.duration)) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
      });
      setMediaAction("seekto", (details) => {
        if (Number.isFinite(details.seekTime) && Number.isFinite(audio.duration)) {
          audio.currentTime = Math.min(audio.duration, Math.max(0, details.seekTime));
        }
      });
    }

    function updateModeButton() {
      const icons = {
        normal: '<path d="M7 7h8.2c2.1 0 3.8 1.7 3.8 3.8v.2h-2v-.2c0-1-.8-1.8-1.8-1.8H7v3l-5-4 5-4v3Zm10 10H8.8C6.7 17 5 15.3 5 13.2V13h2v.2c0 1 .8 1.8 1.8 1.8H17v-3l5 4-5 4v-3Z"/>',
        random: '<path d="M17 3h5v5h-2V6.4l-4.35 4.35-1.4-1.4L18.6 5H17V3ZM3 6h3.3c1.45 0 2.82.64 3.75 1.75l7.2 8.5A3.9 3.9 0 0 0 20.25 18H22v2h-1.75a5.9 5.9 0 0 1-4.52-2.1l-7.2-8.5A2.9 2.9 0 0 0 6.3 8H3V6Zm12.65 7.25 1.4 1.4L20 11.7V10h2v5h-5v-2h1.6l-2.95 2.95-1.4-1.4ZM3 18h3.3c.86 0 1.67-.38 2.22-1.04l1.8-2.13 1.4 1.4-1.67 1.98A4.9 4.9 0 0 1 6.3 20H3v-2Z"/>',
        repeat: '<path d="M7 7h8.2c2.1 0 3.8 1.7 3.8 3.8v.2h-2v-.2c0-1-.8-1.8-1.8-1.8H7v3l-5-4 5-4v3Zm10 10H8.8C6.7 17 5 15.3 5 13.2V13h2v.2c0 1 .8 1.8 1.8 1.8H17v-3l5 4-5 4v-3Zm-5-2V9.8l-1.6.8-.8-1.6L12.3 7H14v8h-2Z"/>'
      };
      const aria = {
        normal: "Обычный режим",
        random: "Случайный режим",
        repeat: "Повтор одного трека"
      };
      modeIcon.innerHTML = icons[playMode];
      modeBtn.setAttribute("aria-label", aria[playMode]);
      modeBtn.classList.toggle("is-active", playMode !== "normal");
      modeBtn.dataset.mode = playMode;
    }

    function nextTrackIndex(direction = 1) {
      const visibleIndexes = getVisibleTrackIndexes();
      if (!visibleIndexes.length) return 0;
      if (playMode === "repeat") return trackIndex;
      if (playMode === "random" && visibleIndexes.length > 1) {
        let next = trackIndex;
        while (next === trackIndex) {
          next = visibleIndexes[Math.floor(Math.random() * visibleIndexes.length)];
        }
        return next;
      }
      const currentVisibleIndex = Math.max(0, visibleIndexes.indexOf(trackIndex));
      return visibleIndexes[(currentVisibleIndex + direction + visibleIndexes.length) % visibleIndexes.length];
    }

    function playNext(direction = 1) {
      switchTrackWithFade(nextTrackIndex(direction)).catch(() => {
        statusText.textContent = "track switch error";
      });
    }

    function formatTime(value) {
      if (!Number.isFinite(value)) return "0:00";
      const minutes = Math.floor(value / 60);
      const seconds = Math.floor(value % 60).toString().padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function seekFromClientX(clientX) {
      if (!Number.isFinite(audio.duration)) return;
      const rect = progress.getBoundingClientRect();
      const ratio = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
      targetProgress = ratio;
      audio.currentTime = ratio * audio.duration;
    }

    function renderProgressVisual(ratio = 0) {
      const clamped = Math.min(1, Math.max(0, ratio));
      const percent = `${(clamped * 100).toFixed(3)}%`;
      if (progressBar) progressBar.style.width = percent;
      if (progressThumb) progressThumb.style.left = percent;
      if (progressBubble) progressBubble.style.left = percent;
    }

    function startUiLoop() {
      if (uiRafId) return;
      let lastUiRender = 0;

      const tick = (now = 0) => {
        uiRafId = requestAnimationFrame(tick);
        if (UI_FRAME_MIN && now - lastUiRender < UI_FRAME_MIN) return;
        lastUiRender = now;
        const smoothing = isSeeking ? .18 : .12;
        displayProgress += (targetProgress - displayProgress) * smoothing;
        if (Math.abs(targetProgress - displayProgress) < 0.0005) {
          displayProgress = targetProgress;
        }
        renderProgressVisual(displayProgress);
      };

      uiRafId = requestAnimationFrame(tick);
    }

    function stopVolumeFade() {
      fadeToken += 1;
      if (volumeRafId) {
        cancelAnimationFrame(volumeRafId);
        volumeRafId = 0;
      }
      return fadeToken;
    }

    function fadeAudioVolume(target, duration = 260) {
      const token = stopVolumeFade();
      const startVolume = audio.volume;
      const endVolume = Math.min(BASE_VOLUME, Math.max(0, target));
      if (duration <= 0 || Math.abs(endVolume - startVolume) < 0.001) {
        audio.volume = endVolume;
        return Promise.resolve();
      }

      return new Promise((resolve) => {
        const startedAt = performance.now();

        const step = (now) => {
          if (token !== fadeToken) {
            resolve();
            return;
          }

          const progress = Math.min(1, (now - startedAt) / duration);
          const eased = 1 - Math.pow(1 - progress, 3);
          audio.volume = startVolume + (endVolume - startVolume) * eased;

          if (progress >= 1) {
            volumeRafId = 0;
            audio.volume = endVolume;
            resolve();
            return;
          }

          volumeRafId = requestAnimationFrame(step);
        };

        volumeRafId = requestAnimationFrame(step);
      });
    }

    async function playWithFade(duration = FADE_IN_MS) {
      setupAudioGraph();
      if (audioContext && audioContext.state === "suspended") {
        await audioContext.resume();
      }

      stopVolumeFade();
      audio.volume = 0;
      await audio.play();
      await fadeAudioVolume(BASE_VOLUME, duration);
    }

    async function pauseWithFade(duration = FADE_OUT_MS) {
      if (audio.paused) return;
      await fadeAudioVolume(0, duration);
      audio.pause();
      audio.volume = BASE_VOLUME;
    }

    async function switchTrackWithFade(index) {
      const shouldResume = !audio.paused;
      const wasSameTrack = tracks.length && ((index + tracks.length) % tracks.length) === trackIndex;

      if (shouldResume && !wasSameTrack) {
        await fadeAudioVolume(0, TRACK_SWITCH_FADE_OUT_MS);
        audio.pause();
      }

      loadTrack(index, false);

      if (shouldResume) {
        await playWithFade(TRACK_SWITCH_FADE_IN_MS);
      }
      logEvent("track_switch", { to: tracks[trackIndex]?.title || "", autoplay: shouldResume });
    }

    playBtn.addEventListener("click", () => {
      togglePlayback().catch(() => {
        statusText.textContent = "Браузер ждёт повторного нажатия";
      });

    prevBtn.addEventListener("click", () => playNext(-1));
    nextBtn.addEventListener("click", () => playNext(1));
    modeBtn.addEventListener("click", () => {

      updateModeButton();

    function closeMenus() {
      playerPanel.classList.remove("is-open", "is-settings-open");

    function resetIdleTimer() {

    let lastIdleReset = 0;
    function resetIdleTimerThrottled(event) {
      if (!isMobile || event.type !== "pointermove") {
        resetIdleTimer();
        return;
      }

      const now = performance.now();
      if (now - lastIdleReset < 900) return;
      lastIdleReset = now;
      resetIdleTimer();
    }

    ["pointerdown", "pointermove", "keydown", "wheel"].forEach((eventName) => {

    progress.addEventListener("pointerdown", (event) => {
      isSeeking = true;

    progress.addEventListener("pointermove", (event) => {

    progress.addEventListener("pointerup", (event) => {
      if (!isSeeking) return;

      seekFromClientX(event.clientX);

      }
    });

      if (progress.hasPointerCapture(event.pointerId)) {

        event.preventDefault();
        audio.currentTime = Math.min(audio.duration, Math.max(0, audio.currentTime + step));
      }
    });

    if (ENABLE_VISUALIZER && THREE) {
    const renderer = new THREE.WebGLRenderer({

    });

    renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? MOBILE_PIXEL_RATIO : DESKTOP_PIXEL_RATIO));
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
    camera.position.set(0, 2.25, 7.8);

    const group = new THREE.Group();

    const keyLight = new THREE.PointLight(0xff5f8a, 10, 16);
    keyLight.position.set(-3.2, 3.6, 4);
    scene.add(keyLight);

    const fillLight = new THREE.PointLight(0x5ee7df, 8, 16);
    fillLight.position.set(3.8, 1.4, 3.4);

    const topLight = new THREE.DirectionalLight(0xfff0bf, 2.6);
